<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos — Coco and Luna</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<style>
  :root{ color-scheme:light;
    --side-bg:#111110;--side-text:#f0ebe0;--side-muted:#6b6760;--side-hover:rgba(240,235,224,0.06);--side-active:#1e1e1c;
    --bg:#ede8df;--surface:#faf8f4;--surface2:#f4f0e8;--border:rgba(30,28,24,0.10);--border2:rgba(30,28,24,0.16);
    --text:#1a1916;--sub:#6b6760;--muted:#9c9790;--rust:#a05a3a;--sage:#6a8c6e;--ink:#2d2a26;
    --green:#3d7a52;--red:#9b3a3a;--amber:#9b7a2a;--radius:10px;--radius-sm:6px; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}

  /* Sidebar: CSS do componente vive em sidebar.js (injetado). Aqui só o layout da página. */

  /* ── Main ── */
  .main{margin-left:180px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .25s cubic-bezier(.4,0,.2,1)}

  /* ── Topbar ── */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
  .live-dot-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-left:auto}
  .ldot{width:5px;height:5px;background:var(--sage);border-radius:50%;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── Market toggle ── */
  .mkt-toggle-wrap{display:flex;align-items:center;gap:4px}
  .mkt-btn{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
  .mkt-btn:hover{border-color:var(--ink);color:var(--text)}
  .mkt-btn.active{background:var(--ink);border-color:var(--ink);color:var(--side-text)}
  .mkt-flag-img{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0}

  /* ── Filter pill ── */
  .filter-pill{display:flex;align-items:center;gap:5px;height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;position:relative}
  .filter-pill:hover,.filter-pill.open{border-color:var(--ink);color:var(--text)}
  .filter-pill .lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
  .filter-pill .val{font-weight:600;color:var(--text)}
  .filter-pill .arr{color:var(--muted);font-size:9px;transition:transform .15s}
  .filter-pill.open .arr{transform:rotate(180deg)}
  .period-pop{position:absolute;top:calc(100% + 6px);right:0;width:270px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 8px 28px rgba(30,28,24,.18);padding:16px;z-index:500;display:none;flex-direction:column;gap:12px}
  .period-pop.open{display:flex}
  .pp-presets{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .pp-presets button{font-size:11px;font-weight:600;padding:8px 0;border:1px solid var(--border2);background:var(--surface2);color:var(--sub);border-radius:var(--radius-sm);cursor:pointer;transition:all .12s;font-family:inherit}
  .pp-presets button:hover{border-color:var(--ink);color:var(--text)}
  .pp-presets button.active{background:var(--ink);border-color:var(--ink);color:var(--side-text)}
  .pp-divider{height:1px;background:var(--border)}
  .pp-section-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
  .pp-dates{display:flex;flex-direction:column;gap:8px}
  .pp-field{display:flex;align-items:center;gap:10px}
  .pp-field label{font-size:11px;font-weight:600;color:var(--sub);width:26px;flex-shrink:0}
  .pp-field input[type=date]{flex:1;font-size:12px;font-family:inherit;color:var(--text);padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);appearance:none;outline:none;transition:border-color .12s}
  .pp-field input[type=date]:focus{border-color:var(--ink)}
  .pp-err{font-size:10px;color:var(--red);min-height:12px}
  .pp-apply{font-size:12px;font-weight:600;padding:9px 0;background:var(--ink);color:var(--side-text);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit}
  .pp-apply:hover{opacity:.85}

  /* ── Sidebar: comportamento de recolher afeta o .main (layout da página) ── */
  body.sidebar-hidden .main{margin-left:0}

  /* ── Content ── */
  .content{padding:28px;display:flex;flex-direction:column;gap:20px;flex:1}
  .page-title{font-size:22px;font-weight:300;letter-spacing:-.5px;line-height:1.1}
  .page-sub{font-size:12px;color:var(--muted);margin-top:3px}

  /* ── Market visibility (mesmo padrão de campanhas.html) ── */
  body:not(.market-us) .ch-us{display:none!important}
  body.market-us .ch-br{display:none!important}

  /* ── Layout toggle (linha x coluna) ── */
  .layout-toggle{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:3px;flex-shrink:0}
  .layout-btn{display:flex;align-items:center;justify-content:center;width:30px;height:26px;border-radius:16px;border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit}
  .layout-btn:hover{color:var(--text)}
  .layout-btn.active{background:var(--ink);color:var(--side-text)}

  /* ── Product cards ── */
  .prod-grid{display:flex;flex-direction:column;gap:12px}
  .prod-grid.layout-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));align-items:start}
  .prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .18s ease,transform .18s ease,opacity .18s ease}
  .prod-card.drop-bounce{animation:prodDropBounce .32s cubic-bezier(.34,1.56,.64,1)}
  @keyframes prodDropBounce{0%{transform:scale(1.035)}60%{transform:scale(.985)}100%{transform:scale(1)}}
  .prod-card-ghost{border:2px dashed var(--sage);border-radius:var(--radius);background:rgba(106,140,110,.08);animation:prodGhostPulse 1.1s ease-in-out infinite}
  @keyframes prodGhostPulse{0%,100%{opacity:.5;background:rgba(106,140,110,.06)}50%{opacity:.95;background:rgba(106,140,110,.14)}}
  /* Clone que segue o cursor durante o arraste (ver attachDragHandlers) — o card real some
     da grade enquanto isso (só o placeholder tracejado acima fica no lugar), então nunca há
     duas cópias visíveis ao mesmo tempo. */
  .prod-card-floating{position:fixed;top:0;left:0;margin:0;pointer-events:none;z-index:9999;max-height:70vh;overflow:hidden;box-shadow:0 22px 40px rgba(0,0,0,.28),0 0 0 3px var(--sage);transform:rotate(-1.1deg) scale(1.02);opacity:.97;transition:none}
  body.dragging-active{cursor:grabbing!important;user-select:none}
  body.dragging-active *{cursor:grabbing!important}
  .prod-card-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;position:relative}
  .drag-handle{cursor:grab;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;width:26px;height:26px;margin:-5px -4px -5px -6px;transition:color .15s ease,transform .15s ease}
  .drag-handle:hover{color:var(--sage);transform:scale(1.2)}
  .drag-handle:active{cursor:grabbing}
  .camp-logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;letter-spacing:-.5px}
  .camp-logo-img{background:#fff;border:1px solid var(--border);padding:5px}
  .camp-logo-img img{width:100%;height:100%;object-fit:contain;display:block}
  .camp-logo-fill{background:transparent;border:none;padding:0;overflow:hidden}
  .camp-logo-fill img{object-fit:cover}
  .camp-ch-name{font-size:13px;font-weight:600;color:var(--text)}
  .camp-ch-type{font-size:10px;color:var(--muted);margin-top:2px}
  .prod-head-stats{display:flex;gap:28px;margin-left:auto;margin-right:88px}
  .prod-stat-lbl{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .prod-stat-val{font-size:17px;font-weight:300;letter-spacing:-.4px}
  .prod-collapse-btn{position:absolute;top:14px;right:16px;width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
  .prod-collapse-btn:hover{border-color:var(--ink);color:var(--text)}
  .prod-collapse-btn i{transition:transform .2s}
  .prod-card.collapsed .prod-collapse-btn i{transform:rotate(-90deg)}
  .prod-card.collapsed .prod-table-wrap{display:none}
  .prod-expand-btn{position:absolute;top:14px;right:50px;width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
  .prod-expand-btn:hover{border-color:var(--ink);color:var(--text)}
  .prod-table-wrap{max-height:420px;overflow-y:auto;overflow-x:auto}
  .prod-card.expanded .prod-table-wrap{max-height:none}
  .prod-table{width:100%;border-collapse:collapse;font-size:12px}
  .prod-table thead th{position:sticky;top:0;background:var(--surface2);text-align:left;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:9px 20px;border-bottom:1px solid var(--border);white-space:nowrap}
  .prod-table thead th.num,.prod-table td.prod-num{text-align:right}
  .prod-table tbody td{padding:9px 20px;border-bottom:1px solid var(--border)}
  .prod-table tbody tr:last-child td{border-bottom:none}
  .prod-name-wrap{display:flex;align-items:center;gap:10px}
  .prod-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface2);border:1px solid var(--border)}
  .prod-thumb-ph{width:34px;height:34px;border-radius:6px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
  .prod-name-col{min-width:0}
  .prod-name-line{display:flex;align-items:center;gap:7px;min-width:0}
  .prod-name{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prod-type-tag{font-size:9px;font-weight:700;letter-spacing:.3px;color:var(--sage);background:rgba(106,140,110,.12);border-radius:4px;padding:2px 6px;flex-shrink:0;white-space:nowrap}
  .prod-combo{font-size:10px;color:var(--muted);margin-top:2px}
  .prod-num{white-space:nowrap;font-variant-numeric:tabular-nums}
  .prod-empty{text-align:center;color:var(--muted);font-style:italic;padding:20px}
  .prod-muted{color:var(--muted)}
  .prod-input{width:64px;text-align:right;font-size:12px;font-family:inherit;color:var(--text);padding:4px 6px;border:1px solid var(--border2);border-radius:5px;background:var(--surface2);outline:none;transition:border-color .12s;font-variant-numeric:tabular-nums}
  .prod-input:focus{border-color:var(--ink);background:#fff}
  .prod-input::placeholder{color:var(--muted)}
  .prod-input-pct{width:52px}
  .prod-profit-pos{color:var(--green)}
  .prod-profit-neg{color:var(--red)}
  .prod-total-row td{font-weight:600;background:var(--surface2);border-top:2px solid var(--border2);vertical-align:middle;padding-top:10px;padding-bottom:10px}
  .prod-total-row td:first-child{font-weight:700;color:var(--text)}
  .prod-total-stack{display:flex;flex-direction:column;align-items:flex-end;gap:2px;line-height:1.3}
  .prod-total-note{font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap}

  /* ── Edição em massa (aplicar valor a todos os produtos de um canal) ── */
  .th-label{display:inline-flex;align-items:center;gap:4px}
  .th-bulk-btn{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;padding:2px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;transition:all .12s}
  .th-bulk-btn:hover{color:var(--text);background:var(--border)}
  .bulk-pop{position:fixed;display:none;flex-direction:column;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 8px 28px rgba(30,28,24,.18);padding:12px;z-index:600;width:190px}
  .bulk-pop.open{display:flex}
  .bulk-pop-label{font-size:10px;font-weight:700;color:var(--sub);line-height:1.3}
  .bulk-pop-hint{font-size:9px;color:var(--muted)}
  .bulk-pop-input{width:100%;font-size:12px;font-family:inherit;color:var(--text);padding:6px 8px;border:1px solid var(--border2);border-radius:5px;background:var(--surface2);outline:none}
  .bulk-pop-input:focus{border-color:var(--ink);background:#fff}
  .bulk-pop-actions{display:flex;gap:6px}
  .bulk-pop-btn{flex:1;font-size:11px;font-weight:600;padding:7px 0;border:1px solid var(--border2);background:var(--surface2);color:var(--sub);border-radius:5px;cursor:pointer;font-family:inherit}
  .bulk-pop-btn:hover{opacity:.85}
  .bulk-pop-btn.primary{background:var(--ink);border-color:var(--ink);color:var(--side-text)}

  @media(max-width:768px){
    .main{margin-left:0}
    .content{padding:16px}
    .prod-head-stats{gap:16px;margin-left:0}
  }

  /* ── Sync / Settings / Refresh (mesmo padrão de index.html) ── */
  .sync-btn,.settings-btn{height:32px;padding:0 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s}
  .sync-btn:hover,.settings-btn:hover{border-color:var(--ink);color:var(--text);background:var(--bg)}
  .settings-btn{padding:0 12px;font-size:14px;line-height:1}
  .csel{position:relative}
  .csel.open .arr{transform:rotate(180deg)}
  .csel.open{border-color:var(--ink)}
  .csel-pop{position:absolute;top:calc(100% + 6px);right:0;min-width:150px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 8px 28px rgba(30,28,24,.18);z-index:500;display:none;flex-direction:column;overflow:hidden}
  .csel.open .csel-pop{display:flex}
  .csel-opt{padding:9px 14px;font-size:12px;color:var(--sub);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
  .csel-opt:hover{background:var(--surface2);color:var(--text)}
  .csel-opt.active{color:var(--text);font-weight:600}
  .csel-opt.active::before{content:'✓';color:var(--ink);font-size:11px;font-weight:700}
  .csel-opt:not(.active)::before{content:'';display:inline-block;width:11px}
  .sp-overlay{position:fixed;inset:0;background:rgba(30,28,24,.35);z-index:600;display:none;backdrop-filter:blur(2px)}
  .sp-overlay.open{display:block}
  .sp-panel{position:fixed;top:0;right:0;width:300px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:700;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sp-panel.open{transform:translateX(0)}
  .sp-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
  .sp-head-title{font-size:14px;font-weight:600;letter-spacing:-.2px}
  .sp-close{background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer;padding:4px;line-height:1;transition:color .12s}
  .sp-close:hover{color:var(--text)}
  .sp-body{flex:1;overflow-y:auto;padding:20px}
  .sp-section{margin-bottom:24px}
  .sp-section-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .sp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
  .sp-row:last-child{border-bottom:none}
  .sp-row-left{display:flex;align-items:center;gap:10px}
  .sp-swatch{width:20px;height:20px;border-radius:4px;border:1px solid rgba(30,28,24,.12);flex-shrink:0}
  .sp-row-label{font-size:12px;color:var(--sub)}
  .sp-foot{padding:16px 20px;border-top:1px solid var(--border)}
  .sp-reset{width:100%;padding:10px;font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--surface2);color:var(--sub);border-radius:var(--radius-sm);cursor:pointer;transition:all .12s}
  .sp-reset:hover{border-color:var(--ink);color:var(--text)}
</style>
</head>
<body>

<script src="sidebar.js"></script>
<script src="colors.js"></script>

<div class="main">
  <div class="topbar">
    <div class="mkt-toggle-wrap">
      <button class="mkt-btn active" id="mktBtnBr" onclick="setMarket('br')">
        <img src="bandeira_brasil.webp" alt="" class="mkt-flag-img"><span>Brasil</span>
      </button>
      <button class="mkt-btn" id="mktBtnUs" onclick="setMarket('us')">
        <img src="bandeira_eua.svg" alt="" class="mkt-flag-img"><span>EUA</span>
      </button>
    </div>
    <div class="live-dot-wrap"><div class="ldot"></div><span id="lastUpdate">—</span></div>
    <button class="sync-btn" id="syncBtn" title="Buscar dados novos agora"><i class="bi bi-arrow-clockwise"></i> Sincronizar</button>
    <button class="settings-btn" id="settingsBtn" title="Configurações de cores"><i class="bi bi-gear-fill"></i></button>

    <!-- Refresh rate -->
    <div class="filter-pill csel" id="cselRefresh">
      <span class="lbl">Atualizar</span>
      <span class="val" id="refreshVal">5 min</span>
      <span class="arr">▾</span>
      <div class="csel-pop">
        <div class="csel-opt" data-value="1">1 min</div>
        <div class="csel-opt active" data-value="5">5 min</div>
        <div class="csel-opt" data-value="15">15 min</div>
        <div class="csel-opt" data-value="30">30 min</div>
        <div class="csel-opt" data-value="0">Desligar</div>
      </div>
    </div>
    <!-- Period -->
    <div style="position:relative" id="periodWrap">
      <div class="filter-pill" id="periodPill" onclick="togglePeriodPop()">
        <span class="lbl">Período</span>
        <span class="val" id="periodValue">30 dias</span>
        <span class="arr">▾</span>
      </div>
      <div class="period-pop" id="periodPop">
        <div class="pp-presets">
          <button data-preset="today" onclick="selectPreset(this,'Hoje')">Hoje</button>
          <button data-preset="7d" onclick="selectPreset(this,'7 dias')">7 dias</button>
          <button data-preset="30d" class="active" onclick="selectPreset(this,'30 dias')">30 dias</button>
          <button data-preset="month" onclick="selectPreset(this,'Este mês')">Este mês</button>
        </div>
        <div class="pp-divider"></div>
        <div class="pp-section-label">Intervalo personalizado</div>
        <div class="pp-dates">
          <div class="pp-field"><label>De</label><input type="date" id="dateFrom"></div>
          <div class="pp-field"><label>Até</label><input type="date" id="dateTo"></div>
        </div>
        <div class="pp-err" id="ppErr"></div>
        <button class="pp-apply" onclick="applyRange()">Aplicar intervalo</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="page-title">Produtos</div>
        <div class="page-sub" id="pageSub">Coco and Luna · últimos 30 dias</div>
      </div>
      <div class="layout-toggle" id="layoutToggle">
        <button class="layout-btn" data-layout="row" onclick="setLayout('row')" title="Linha — uma tabela abaixo da outra"><i class="bi bi-list-ul"></i></button>
        <button class="layout-btn" data-layout="col" onclick="setLayout('col')" title="Coluna — tabelas lado a lado"><i class="bi bi-layout-split"></i></button>
      </div>
    </div>

    <div class="prod-grid" id="prodGrid"></div>
  </div>

  <div class="bulk-pop" id="bulkPop">
    <div class="bulk-pop-label" id="bulkPopLabel">Aplicar a todos</div>
    <input type="number" step="0.01" class="bulk-pop-input" id="bulkPopInput" placeholder="Valor">
    <div class="bulk-pop-hint">Vazio = volta ao padrão de cada produto · 0 é um valor válido</div>
    <div class="bulk-pop-actions">
      <button class="bulk-pop-btn primary" onclick="applyBulk()">Aplicar</button>
      <button class="bulk-pop-btn" onclick="closeBulkPop()">Cancelar</button>
    </div>
  </div>

  <div class="sp-overlay" id="spOverlay"></div>
  <div class="sp-panel" id="spPanel">
    <div class="sp-head">
      <span class="sp-head-title">Configurações</span>
      <button class="sp-close" id="spClose">✕</button>
    </div>
    <div class="sp-body">
      <div class="sp-section">
        <div class="sp-section-title">Cores dos canais</div>
        <div id="sp-ch-colors"></div>
      </div>
      <div class="sp-section">
        <div class="sp-section-title">Cores de marketing</div>
        <div id="sp-mkt-colors"></div>
      </div>
    </div>
    <div class="sp-foot">
      <button class="sp-reset" id="spReset">↺ Redefinir para os padrões</button>
    </div>
  </div>

  <footer id="footerDate" style="padding:0 28px 20px;font-size:11px;color:var(--muted)"></footer>
</div>

<script>
const fmtInt = v => Math.round(v || 0).toLocaleString('pt-BR');
function fmtMoney(v, mkt = market) {
  return (mkt === 'us')
    ? (v || 0).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })
    : (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
}

// ── Metadados de canal (mesmas cores de index.html/DEFAULT_CH) ──
const CH_META = {
  shopify:      { name: 'Shopify BR',    color: '#95BF47', logo: 'logo_shopify.png' },
  shopee:       { name: 'Shopee',        color: '#EE4D2D', logo: 'logo_shopee.svg' },
  mercadolivre: { name: 'Mercado Livre', color: '#FFE600', logo: 'logo_mercadolivre.png', logoFill: true },
  amazon:       { name: 'Amazon BR',     color: '#111111', logo: 'logo_amazon.webp' },
  shopify_us:   { name: 'Shopify US',    color: '#7EAD3C', logo: 'logo_shopify.png' },
  amazon_us:    { name: 'Amazon US',     color: '#FF9900', logo: 'logo_amazon.webp' },
};
const CHANNELS_BR = ['shopify', 'shopee', 'amazon', 'mercadolivre'];
const CHANNELS_US = ['shopify_us', 'amazon_us'];

function contrastText(hex) {
  const h = (hex || '#000').replace('#', '');
  if (h.length !== 6) return '#fff';
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.55 ? '#333' : '#fff';
}

// ── State ─────────────────────────────────────────────────
let market = localStorage.getItem('coco_market') || 'br';
let current = null;
// Cards sempre abrem só com o primeiro expandido — não persiste entre recarregamentos (proposital).
let collapsedState = {};
const expandedState = JSON.parse(localStorage.getItem('coco_produtos_expanded') || '{}');
let layout = localStorage.getItem('coco_produtos_layout') || 'row';

// ── Refresh automático (mesmo padrão de index.html) ────────
let refreshMin = Number(localStorage.getItem('coco_refresh') ?? 5);
let refreshTimer = null;
function applyRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (refreshMin > 0) refreshTimer = setInterval(load, refreshMin * 60 * 1000);
}

// ── Ordem dos canais (drag and drop) ───────────────────────
let channelOrder = JSON.parse(localStorage.getItem('coco_produtos_order') || '{}');
function getOrderedChannels(m) {
  const base = m === 'us' ? CHANNELS_US : CHANNELS_BR;
  const saved = channelOrder[m];
  if (!saved || !saved.length) return base.slice();
  const ordered = saved.filter(ch => base.includes(ch));
  base.forEach(ch => { if (!ordered.includes(ch)) ordered.push(ch); });
  return ordered;
}
function applyDefaultCollapse(orderedChannels) {
  collapsedState = {};
  orderedChannels.forEach((ch, i) => { collapsedState[ch] = i !== 0; });
}

function setLayout(mode) {
  layout = mode;
  localStorage.setItem('coco_produtos_layout', mode);
  applyLayout();
}
function applyLayout() {
  document.getElementById('prodGrid').classList.toggle('layout-col', layout === 'col');
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === layout));
}

function toggleCollapse(ch) {
  collapsedState[ch] = !collapsedState[ch];
  document.getElementById(`prod-card-${ch}`)?.classList.toggle('collapsed', collapsedState[ch]);
}

// ── Drag and drop (reordenar cards de canal) — arraste customizado por ponteiro,
// não usa a Drag and Drop API nativa do HTML5. A API nativa deixa o elemento de
// origem no DOM (é dele que o navegador tira a "imagem fantasma" que acompanha o
// cursor, fora do nosso controle) — na prática dava a sensação de duas cópias do
// card: uma parada no lugar original e outra "puxando" em outro ponto da lista.
// Aqui o card real é removido da grade assim que o arraste começa (só sobra o
// placeholder tracejado indicando onde ele vai cair) e um clone dele, em
// position:fixed, segue o cursor de verdade a cada mousemove — só uma cópia
// visível a qualquer momento, sempre grudada no mouse.
let dragCard = null;
let dragGhost = null;
let dragClone = null;
let dragGrabX = 0, dragGrabY = 0;
let dragStartX = 0, dragStartY = 0;
let dragStarted = false;
const DRAG_MOVE_THRESHOLD = 4; // px — evita iniciar o arraste num simples clique na alça

function getDragAfterElement(container, x, y) {
  const els = [...container.querySelectorAll('.prod-card')];
  let closest = null, closestDist = Infinity;
  for (const el of els) {
    const box = el.getBoundingClientRect();
    const cx = box.left + box.width / 2, cy = box.top + box.height / 2;
    const dist = Math.hypot(x - cx, y - cy);
    if (dist < closestDist) closestDist = dist, closest = { el, box };
  }
  if (!closest) return null;
  const cy = closest.box.top + closest.box.height / 2;
  return (y > cy) ? closest.el.nextElementSibling : closest.el;
}
function persistOrder() {
  const grid = document.getElementById('prodGrid');
  channelOrder[market] = [...grid.querySelectorAll('.prod-card')].map(c => c.dataset.ch);
  localStorage.setItem('coco_produtos_order', JSON.stringify(channelOrder));
  applyDefaultCollapse(channelOrder[market]);
  document.querySelectorAll('.prod-card').forEach(c => c.classList.toggle('collapsed', collapsedState[c.dataset.ch]));
}
function beginDrag() {
  dragStarted = true;
  const card = dragCard;
  const rect = card.getBoundingClientRect();
  dragGrabX = dragStartX - rect.left;
  dragGrabY = dragStartY - rect.top;

  dragGhost = document.createElement('div');
  dragGhost.className = 'prod-card-ghost';
  dragGhost.style.height = rect.height + 'px';
  card.after(dragGhost);

  dragClone = card.cloneNode(true);
  dragClone.classList.add('prod-card-floating');
  dragClone.style.width = rect.width + 'px';
  dragClone.style.left = rect.left + 'px';
  dragClone.style.top = rect.top + 'px';
  document.body.appendChild(dragClone);

  card.remove();
  document.body.classList.add('dragging-active');
}
function dragPointerMove(e) {
  if (!dragStarted) {
    if (Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) < DRAG_MOVE_THRESHOLD) return;
    beginDrag();
  }
  dragClone.style.left = (e.clientX - dragGrabX) + 'px';
  dragClone.style.top = (e.clientY - dragGrabY) + 'px';
  const grid = document.getElementById('prodGrid');
  const afterEl = getDragAfterElement(grid, e.clientX, e.clientY);
  if (afterEl == null) grid.appendChild(dragGhost);
  else if (afterEl !== dragGhost) grid.insertBefore(dragGhost, afterEl);
}
function dragPointerUp() {
  document.removeEventListener('mousemove', dragPointerMove);
  document.removeEventListener('mouseup', dragPointerUp);
  const card = dragCard;
  if (dragStarted && card) {
    const grid = document.getElementById('prodGrid');
    grid.insertBefore(card, dragGhost);
    card.classList.add('drop-bounce');
    setTimeout(() => card.classList.remove('drop-bounce'), 320);
    persistOrder();
  }
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  if (dragClone) { dragClone.remove(); dragClone = null; }
  document.body.classList.remove('dragging-active');
  dragCard = null;
  dragStarted = false;
}
function attachDragHandlers() {
  const grid = document.getElementById('prodGrid');
  grid.querySelectorAll('.prod-card').forEach(card => {
    card.querySelector('.drag-handle')?.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      dragCard = card;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStarted = false;
      document.addEventListener('mousemove', dragPointerMove);
      document.addEventListener('mouseup', dragPointerUp);
    });
  });
}

function toggleExpand(ch) {
  expandedState[ch] = !expandedState[ch];
  localStorage.setItem('coco_produtos_expanded', JSON.stringify(expandedState));
  const card = document.getElementById(`prod-card-${ch}`);
  card?.classList.toggle('expanded', expandedState[ch]);
  const icon = card?.querySelector('.prod-expand-btn i');
  if (icon) icon.className = expandedState[ch] ? 'bi bi-arrows-angle-contract' : 'bi bi-arrows-angle-expand';
}

// ── Edição em massa (aplicar valor a todos os produtos de um canal) ──
let bulkTarget = null;
function openBulkPop(e, field, ch, label) {
  e.stopPropagation();
  bulkTarget = { field, ch };
  const pop = document.getElementById('bulkPop');
  document.getElementById('bulkPopLabel').textContent = `${label} — ${CH_META[ch]?.name || ch}`;
  const input = document.getElementById('bulkPopInput');
  input.value = '';
  const rect = e.currentTarget.getBoundingClientRect();
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 206)) + 'px';
  pop.classList.add('open');
  input.focus();
}
function closeBulkPop() {
  document.getElementById('bulkPop').classList.remove('open');
  bulkTarget = null;
}
async function applyBulk() {
  if (!bulkTarget) return;
  const { field, ch } = bulkTarget;
  const input = document.getElementById('bulkPopInput');
  const value = input.value === '' ? null : Number(input.value);
  const products = current?.channels?.[ch]?.products || [];
  closeBulkPop();
  if (!products.length) return;
  await Promise.all(products.map(p => fetch('/api/products/finance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: ch, title: p.title, [field]: value }),
  })));
  await load();
}
document.addEventListener('click', e => {
  const pop = document.getElementById('bulkPop');
  if (pop.classList.contains('open') && !pop.contains(e.target) && !e.target.closest('.th-bulk-btn')) closeBulkPop();
});

function rangeForPreset(p) {
  const today = new Date(); const iso = d => d.toISOString().slice(0, 10);
  if (p === 'today') return { since: iso(today), until: iso(today), label: 'Hoje' };
  if (p === '7d')   { const s = new Date(today); s.setDate(s.getDate() - 6); return { since: iso(s), until: iso(today), label: '7 dias' }; }
  if (p === 'month'){ const s = new Date(today.getFullYear(), today.getMonth(), 1); return { since: iso(s), until: iso(today), label: 'Este mês' }; }
  const s = new Date(today); s.setDate(s.getDate() - 29); return { since: iso(s), until: iso(today), label: '30 dias' };
}
let state = rangeForPreset('30d');

// ── Market ────────────────────────────────────────────────
function setMarket(m) {
  market = m;
  localStorage.setItem('coco_market', m);
  document.getElementById('mktBtnBr').classList.toggle('active', m === 'br');
  document.getElementById('mktBtnUs').classList.toggle('active', m === 'us');
  document.body.classList.toggle('market-us', m === 'us');
  applyDefaultCollapse(getOrderedChannels(m));
  load();
}

// ── Period picker ─────────────────────────────────────────
function togglePeriodPop() {
  document.getElementById('periodPop').classList.toggle('open');
  document.getElementById('periodPill').classList.toggle('open');
}
function selectPreset(btn, label) {
  document.querySelectorAll('.pp-presets button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state = rangeForPreset(btn.dataset.preset);
  document.getElementById('periodValue').textContent = label;
  document.getElementById('periodPop').classList.remove('open');
  document.getElementById('periodPill').classList.remove('open');
  load();
}
function applyRange() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const err = document.getElementById('ppErr');
  if (!from || !to) { err.textContent = 'Preencha as duas datas'; return; }
  if (from > to) { err.textContent = 'A data inicial deve ser anterior à final'; return; }
  err.textContent = '';
  state = { since: from, until: to, label: `${from.slice(8)}.${from.slice(5,7)} – ${to.slice(8)}.${to.slice(5,7)}` };
  document.getElementById('periodValue').textContent = state.label;
  document.getElementById('periodPop').classList.remove('open');
  document.getElementById('periodPill').classList.remove('open');
  load();
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('periodWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('periodPop').classList.remove('open');
    document.getElementById('periodPill').classList.remove('open');
  }
});

// ── Refresh rate dropdown ───────────────────────────────────
document.getElementById('cselRefresh').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('cselRefresh').classList.toggle('open');
});
document.querySelectorAll('#cselRefresh .csel-opt').forEach(opt => {
  opt.addEventListener('click', e => {
    e.stopPropagation();
    refreshMin = Number(opt.dataset.value);
    localStorage.setItem('coco_refresh', refreshMin);
    document.getElementById('refreshVal').textContent = refreshMin === 0 ? 'Desligar' : `${refreshMin} min`;
    document.querySelectorAll('#cselRefresh .csel-opt').forEach(o => o.classList.toggle('active', Number(o.dataset.value) === refreshMin));
    document.getElementById('cselRefresh').classList.remove('open');
    applyRefresh();
  });
});
document.addEventListener('click', () => document.getElementById('cselRefresh')?.classList.remove('open'));

// ── Sincronizar agora ────────────────────────────────────────
document.getElementById('syncBtn').addEventListener('click', async () => {
  try { await fetch('/api/sync', { method: 'POST' }); } catch (e) {}
  load();
});

// ── Painel de Configurações (cores, via colors.js) ──────────
function buildSettingsPanel() {
  CocoColors.buildSection('sp-ch-colors', CocoColors.DEFAULT_CH, 'ch', k => CocoColors.ch[k].bg, (k, v) => {
    CocoColors.ch[k] = { bg: v, text: CocoColors.contrastText(v), label: CocoColors.DEFAULT_CH[k].label };
    CocoColors.save(`ch.${k}`, v);
  });
  CocoColors.buildSection('sp-mkt-colors', CocoColors.DEFAULT_MKT, 'mkt', k => CocoColors.mkt[k], (k, v) => {
    CocoColors.mkt[k] = v;
    CocoColors.save(`mkt.${k}`, v);
  });
}
function openSettings() {
  buildSettingsPanel();
  document.getElementById('spOverlay').classList.add('open');
  document.getElementById('spPanel').classList.add('open');
}
function closeSettings() {
  document.getElementById('spOverlay').classList.remove('open');
  document.getElementById('spPanel').classList.remove('open');
}
document.getElementById('settingsBtn').addEventListener('click', e => { e.stopPropagation(); openSettings(); });
document.getElementById('spClose').addEventListener('click', closeSettings);
document.getElementById('spOverlay').addEventListener('click', closeSettings);
document.getElementById('spReset').addEventListener('click', () => {
  CocoColors.resetAll();
  buildSettingsPanel();
});

const setText = (id, t) => { const e = document.getElementById(id); if (e) e.textContent = t; };

// ── Render ────────────────────────────────────────────────
function logoHTML(meta) {
  if (meta.logo) {
    const cls = meta.logoFill ? 'camp-logo camp-logo-img camp-logo-fill' : 'camp-logo camp-logo-img';
    return `<div class="${cls}"><img src="${meta.logo}" alt="${meta.name}" draggable="false"></div>`;
  }
  return `<div class="camp-logo" style="background:${meta.color};color:${contrastText(meta.color)}">${meta.badge}</div>`;
}

function comboBits(p) {
  if (!p.comboQty) return '';
  const parts = Object.entries(p.comboBySize || {})
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .map(([size, n]) => `${n} combo de ${size}`);
  return `${p.avulsoQty || 0} avulso, ${parts.join(', ')}`;
}

const escAttr = s => String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
const fmtPct = v => (v * 100).toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + '%';

function rowHTML(p, ch) {
  const combo = comboBits(p);
  const thumb = p.image
    ? `<img class="prod-thumb" src="${p.image}" alt="" loading="lazy" draggable="false" onerror="this.outerHTML='<div class=&quot;prod-thumb-ph&quot;><i class=&quot;bi bi-image&quot;></i></div>'">`
    : `<div class="prod-thumb-ph"><i class="bi bi-image"></i></div>`;
  const typeTag = p.type ? `<span class="prod-type-tag">${p.type}</span>` : '';
  const dataAttrs = `data-channel="${escAttr(ch)}" data-title="${escAttr(p.title)}"`;
  const profitCells = p.profit != null
    ? `<td class="prod-num ${p.profit >= 0 ? 'prod-profit-pos' : 'prod-profit-neg'}">${fmtMoney(p.profit)}</td>
       <td class="prod-num ${p.profit >= 0 ? 'prod-profit-pos' : 'prod-profit-neg'}">${fmtPct(p.profitPct)}</td>`
    : `<td class="prod-num prod-muted">—</td><td class="prod-num prod-muted">—</td>`;
  return `<tr>
    <td>
      <div class="prod-name-wrap">
        ${thumb}
        <div class="prod-name-col">
          <div class="prod-name-line"><span class="prod-name" title="${p.title}">${p.title}</span>${typeTag}</div>
          ${combo ? `<div class="prod-combo">${combo}</div>` : ''}
        </div>
      </div>
    </td>
    <td class="prod-num">${fmtInt(p.qty)}</td>
    <td class="prod-num">${fmtMoney(p.revenue)}</td>
    <td class="prod-num">${fmtMoney(p.avgTicket)}</td>
    <td class="prod-num"><input class="prod-input" type="number" step="0.01" placeholder="—" value="${p.cog ?? ''}" ${dataAttrs} data-field="cog" title="Custo do produto (COG), por unidade. Vazio = usa o padrão; 0 é um valor válido e fica salvo."></td>
    <td class="prod-num"><input class="prod-input" type="number" step="0.01" placeholder="—" value="${p.shipping ?? ''}" ${dataAttrs} data-field="shipping" title="Custo de frete, por unidade. Vazio = considera 0; 0 é um valor válido e fica salvo."></td>
    <td class="prod-num"><input class="prod-input prod-input-pct" type="number" step="0.01" placeholder="—" value="${p.taxPct ?? ''}" ${dataAttrs} data-field="taxPct" title="% de imposto sobre a venda. Vazio = usa o padrão; 0 é um valor válido e fica salvo."></td>
    <td class="prod-num"><input class="prod-input prod-input-pct" type="number" step="0.01" placeholder="—" value="${p.commissionPct ?? ''}" ${dataAttrs} data-field="commissionPct" title="% de comissão do marketplace. Vazio = usa o padrão; 0 é um valor válido e fica salvo."></td>
    ${profitCells}
  </tr>`;
}

function cardHTML(ch) {
  const meta = CH_META[ch];
  const chClass = CHANNELS_US.includes(ch) ? 'ch-us' : 'ch-br';
  const data = current?.channels?.[ch];
  const products = data?.products || [];
  const rows = products.length
    ? products.map(p => rowHTML(p, ch)).join('')
    : '<tr><td colspan="10" class="prod-empty">Nenhum produto encontrado</td></tr>';
  const collapsed = collapsedState[ch] ? ' collapsed' : '';
  const expanded = expandedState[ch] ? ' expanded' : '';
  const expandIcon = expandedState[ch] ? 'bi-arrows-angle-contract' : 'bi-arrows-angle-expand';
  const totalQty = products.reduce((a, p) => a + p.qty, 0);
  const totalShipping = products.reduce((a, p) => a + (p.shippingTotal || 0), 0);
  const profitClass = data?.totalProfit != null ? (data.totalProfit >= 0 ? 'prod-profit-pos' : 'prod-profit-neg') : 'prod-muted';
  const footRow = products.length ? `<tfoot><tr class="prod-total-row">
    <td>Total</td>
    <td class="prod-num">${fmtInt(totalQty)}</td>
    <td class="prod-num">${fmtMoney(data.revenue)}</td>
    <td class="prod-num prod-muted">—</td>
    <td class="prod-num prod-muted">—</td>
    <td class="prod-num">${fmtMoney(totalShipping)}</td>
    <td class="prod-num prod-muted">—</td>
    <td class="prod-num prod-muted">—</td>
    <td class="prod-num ${profitClass}">
      <div class="prod-total-stack">
        <span>${data.totalProfit != null ? fmtMoney(data.totalProfit) : '—'}</span>
        <span class="prod-total-note">${data.profitProductsCount || 0}/${products.length} c/ custo</span>
      </div>
    </td>
    <td class="prod-num ${profitClass}">${data.profitPct != null ? fmtPct(data.profitPct) : '—'}</td>
  </tr></tfoot>` : '';
  return `
    <div class="prod-card ${chClass}${collapsed}${expanded}" id="prod-card-${ch}" data-ch="${ch}">
      <div class="prod-card-head">
        <span class="drag-handle" title="Arrastar para reordenar"><i class="bi bi-grip-vertical"></i></span>
        <button class="prod-expand-btn" onclick="toggleExpand('${ch}')" title="Expandir/recolher altura da tabela"><i class="bi ${expandIcon}"></i></button>
        <button class="prod-collapse-btn" onclick="toggleCollapse('${ch}')" title="Minimizar/expandir"><i class="bi bi-chevron-down"></i></button>
        ${logoHTML(meta)}
        <div>
          <div class="camp-ch-name">${meta.name}</div>
          <div class="camp-ch-type">${products.length} produto${products.length === 1 ? '' : 's'}</div>
        </div>
        <div class="prod-head-stats">
          <div>
            <div class="prod-stat-lbl">Receita</div>
            <div class="prod-stat-val">${fmtMoney(data?.revenue || 0)}</div>
          </div>
          <div>
            <div class="prod-stat-lbl">Pedidos</div>
            <div class="prod-stat-val">${fmtInt(data?.orders || 0)}</div>
          </div>
        </div>
      </div>
      <div class="prod-table-wrap">
        <table class="prod-table">
          <thead><tr>
            <th>Produto</th><th class="num">Qtd</th><th class="num">Receita</th><th class="num">Ticket médio</th>
            <th class="num"><span class="th-label">COG (un.)<button class="th-bulk-btn" onclick="openBulkPop(event,'cog','${ch}','COG (un.)')" title="Definir para todos os produtos deste canal"><i class="bi bi-pencil-fill"></i></button></span></th>
            <th class="num"><span class="th-label">Frete (un.)<button class="th-bulk-btn" onclick="openBulkPop(event,'shipping','${ch}','Frete (un.)')" title="Definir para todos os produtos deste canal"><i class="bi bi-pencil-fill"></i></button></span></th>
            <th class="num"><span class="th-label">Impostos %<button class="th-bulk-btn" onclick="openBulkPop(event,'taxPct','${ch}','Impostos %')" title="Definir para todos os produtos deste canal"><i class="bi bi-pencil-fill"></i></button></span></th>
            <th class="num"><span class="th-label">Comissão %<button class="th-bulk-btn" onclick="openBulkPop(event,'commissionPct','${ch}','Comissão %')" title="Definir para todos os produtos deste canal"><i class="bi bi-pencil-fill"></i></button></span></th>
            <th class="num">Lucro</th><th class="num">Lucro %</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          ${footRow}
        </table>
      </div>
    </div>`;
}

async function onFinanceEdit(e) {
  const inp = e.target;
  const { channel, title, field } = inp.dataset;
  const value = inp.value === '' ? null : Number(inp.value);
  inp.disabled = true;
  try {
    await fetch('/api/products/finance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, title, [field]: value }),
    });
    await load();
  } catch (err) {
    console.warn('Produtos: falha ao salvar dado financeiro', err);
    inp.disabled = false;
  }
}

function render() {
  const d = current; if (!d) return;
  const updated = d.updatedAt ? new Date(d.updatedAt).toLocaleString('pt-BR') : '—';
  setText('lastUpdate', 'sync: ' + updated);
  setText('pageSub', 'Coco and Luna · ' + state.label);
  setText('footerDate', `Coco and Luna · período ${state.label} · última sincronização: ${updated}`);
  const channels = getOrderedChannels(market);
  document.getElementById('prodGrid').innerHTML = channels.map(cardHTML).join('');
  document.querySelectorAll('.prod-input').forEach(inp => inp.addEventListener('change', onFinanceEdit));
  attachDragHandlers();
}

// ── Carregamento ──────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(`/api/products?market=${market}&since=${state.since}&until=${state.until}`);
    current = await r.json();
  } catch (e) { console.warn('Produtos: falha ao carregar', e); return; }
  render();
}

// ── Init ─────────────────────────────────────────────────
(function init(){
  document.getElementById('mktBtnBr').classList.toggle('active', market === 'br');
  document.getElementById('mktBtnUs').classList.toggle('active', market === 'us');
  document.body.classList.toggle('market-us', market === 'us');
  applyLayout();
  applyDefaultCollapse(getOrderedChannels(market));
  document.getElementById('refreshVal').textContent = refreshMin === 0 ? 'Desligar' : `${refreshMin} min`;
  document.querySelectorAll('#cselRefresh .csel-opt').forEach(o => o.classList.toggle('active', Number(o.dataset.value) === refreshMin));
  applyRefresh();
  load();
})();
</script>
</body>
</html>
